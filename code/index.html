<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attendance Dashboard</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <header>
    <h1>Attendance</h1>
    <!-- centered logo -->
    <img id="logo" src="UNIVERSITY NEW LOGO.png" alt="Logo" />
    <nav class="top-nav">
      <a href="#">Home</a>
      <a href="#">Profile</a>
      <!-- make Settings active button -->
      <button id="settingsBtn" class="nav-btn">Settings</button>
      <label class="theme-switch">
        <input type="checkbox" id="themeToggle" />
        <span class="slider"></span>
      </label>
    </nav>
  </header>

  <main>
    <div class="controls">
      <!-- search -->
      <input type="text" id="search" placeholder="Search Students" />

      <!-- subject select -->
      <select id="subjectSelect">
        <option value="">Select Subject</option>
        <option value="Mathematics">Mathematics</option>
        <option value="Science">hchchcb</option>
        <option value="English">English</option>
        <option value="History">History</option>
        <option value="Computer Science">Computer Science</option>
        <option value="Computer Science">Computer Science</option>
        <option value="Computer Science">Computer Science</option>
      </select>
      <div>
        <!-- section select -->
        <select id="SectionSelect">
          <option value="">Section</option>
          <option value="Section A">A</option>
          <option value="Section B">B</option>
          </select>
      </div>

      <!-- calendar -->
      <input type="date" id="calendar" />

      <!-- two period time pickers -->
      <div id="periods">
        <input type="time" id="period1Time" title="Period 1 time" />
        <input type="time" id="period2Time" title="Period 2 time" />
      </div>

      <button id="markAll" style="background-color: blue;">Mark All Present</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Roll No.</th>
          <th>Name</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="studentList">
        <!-- Students will be rendered here -->
      </tbody>
    </table>
  </main>

  <!-- Settings side panel -->
  <aside id="settingsPanel" class="hidden">
    <div class="panel-header">
      <h3>Manage Students</h3>
      <button id="closeSettings">Close</button>
    </div>
    <div class="panel-body">
      <div class="add-student">
        <input type="text" id="newStudentName" placeholder="New student name" />
        <button id="addStudentBtn">Add</button>
      </div>
      <ul id="settingsList">
        <!-- dynamic list -->
      </ul>
    </div>
  </aside>

  <!-- Footer with PDF download -->
  <footer id="appFooter">
    <button id="downloadPdf">Download Attendance PDF</button>
  </footer>

  <!-- jsPDF CDN (used to generate PDF) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="index.js"></script>
</body>
</html>
